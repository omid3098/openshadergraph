name: "Unity HLSL"
version: "1.0"
file_extensions: ["shader"]
nodes:
  surface:
    template: |
      Shader "{{name}}" {
          Properties {
              {{exposed_nodes}}
          }
          SubShader {
              {{meta}}
              CGPROGRAM
              #pragma surface surf Standard
              struct Input {
                  float2 uv_MainTex;
              };
              void surf (Input IN, inout SurfaceOutputStandard o) {
                  {{internal_nodes}}
              }
              ENDCG
          }
      }
  vertex_pass:
    template: "{{internal_nodes}}"
  fragment_pass:
    template: "{{internal_nodes}}"
  color:
    template: "float4 {{name}} = float4({{inputs:0}});"
  float:
    template: "float {{name}} = {{inputs:0}};"
  fragment_output:
    template: "o.Albedo = float3(({{inputs:0}}).rgb);\n\to.Roughness = {{inputs:1}};\n\to.Metallic = {{inputs:2}};\n\to.Emission = float3(({{inputs:3}}).rgb);\n\to.Normal = float3(({{inputs:4}}).rgb);\n\to.Alpha = {{inputs:5}};"
  add:
    template: "float4 {{name}} = {{inputs:0}} + {{inputs:1}};"

meta:
  blend_mode_transparent:
    template: Tags { "Queue" = "Transparent" }
  blend_mode_opaque:
    template: Tags { "Queue" = "Opaque" }
  alpha_mode_SrcAlpha_OneMinusSrcAlpha:
    template: Blend SrcAlpha OneMinusSrcAlpha
  varing:
    template: "varing {{definitaion}}"
  exposed:
    template: "uniform {{definition}}"