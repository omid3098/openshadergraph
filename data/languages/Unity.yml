name: "Unity HLSL"
version: "1.0"
file_extensions: ["shader"]
nodes:
  surface:
    template: |
      Shader "Custom/{{title}}" {
          Properties {
              {{exposable_nodes}}
          }
          SubShader {
              {{meta.blend_mode}}
              CGPROGRAM
              #pragma surface surf Standard
              struct Input {
                  float2 uv_MainTex;
              };
              void surf (Input IN, inout SurfaceOutputStandard o) {
                  {{internal_nodes}}
              }
              ENDCG
          }
      }
  vertex_pass:
    template: "{{internal_nodes}}"
  fragment_pass:
    template: "{{internal_nodes}}"
  color:
    template: "float4 {{var_name}} = _{{var_name}};"
  fragment_output:
    template: "o.Albedo = float3({{inputs.Color}}.rgb);"
meta_templates:
  blend_mode:
    transparent: |
          Tags { "Queue" = "Transparent" }
          Blend SrcAlpha OneMinusSrcAlpha
    opaque: ""
exposable_nodes:
  color:
    template: |
      [Header(Color)]
      _{{var_name}} ("Color", Color) = (1,1,1,1)