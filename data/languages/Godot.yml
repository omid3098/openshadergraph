name: "Godot Shader Language"
version: "1.0"
file_extensions: ["gdshader"]
nodes:
  surface:
    template: |
      shader_type spatial;
      {{meta}}
      {{exposed_nodes}}
      {{internal_nodes}}
  vertex_pass:
    template: |
      void vertex() {
      {{internal_nodes}}
      }
  fragment_pass:
    template: |
      void fragment() {
      {{internal_nodes}}
      }
  color:
    template: "vec4 {{name}} = vec4({{inputs:0}});"
  fragment_output:
    template: "ALBEDO = vec3({{inputs:0}}.rgb);"

meta:
  blend_mode_transparent:
    template: Tags { "Queue" = "Transparent" }
  blend_mode_opaque:
    template: Tags { "Queue" = "Opaque" }
  alpha_mode_SrcAlpha_OneMinusSrcAlpha:
    template: Blend SrcAlpha OneMinusSrcAlpha
  varing:
    template: "varing {{definitaion}}"
  exposed:
    template: "uniform {{definition}}"