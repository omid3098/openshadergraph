name: "Godot Shader Language"
version: "1.0"
file_extensions: ["gdshader"]
nodes:
  surface:
    template: |
      shader_type spatial;
      {{meta.blend_mode}}{{internal_nodes}}
  vertex_pass:
    template: |
      void vertex() {
          {{internal_nodes}}
      }
  fragment_pass:
    template: |
      void fragment() {
          {{internal_nodes}}
      }
  color:
    template: "vec4 {{var_name}} = vec4({{inputs.in}});"
  fragment_output:
    template: "ALBEDO = vec3({{inputs.Color}}.rgb);"