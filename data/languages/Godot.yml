# data/languages/GodotShader.yml
name: "Godot Shader Language"
version: "1.0"
file_extensions: ["gdshader"]

# The master code template for generating the final shader file.
code_template: |
  shader_type {{graph_type}};

  // Uniforms
  {{uniforms}}

  // Varyings
  {{varyings}}

  void vertex() {
      {{vertex_code}}
  }

  void fragment() {
      {{fragment_code}}
  }