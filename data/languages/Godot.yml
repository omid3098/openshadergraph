name: "Godot Shader Language"
version: "1.0"
file_extensions: ["gdshader"]
nodes:
  surface:
    template: |
      shader_type spatial;
      {{meta}}
      {{exposed_nodes}}
      {{internal_nodes}}
  vertex_pass:
    template: |
      void vertex() {
      {{internal_nodes}}
      }
  fragment_pass:
    template: |
      void fragment() {
      {{internal_nodes}}
      }
  color:
    template: "vec4 {{name}} = vec4({{inputs:0}});"
  float:
    template: "float {{name}} = {{inputs:0}};"
  fragment_output:
    template: "ALBEDO = vec3(({{inputs:0}}).rgb);\n\tROUGHNESS = {{inputs:1}};\n\tMETALLIC = {{inputs:2}};"
  add:
    template: "float4 {{name}} = {{inputs:0}} + {{inputs:1}};"

meta:
  blend_mode_transparent:
    template: render_mode blend_mix;
  blend_mode_opaque:
    template: ""
  alpha_mode_SrcAlpha_OneMinusSrcAlpha:
    template: render_mode blend_mul;
  varing:
    template: "varing {{definitaion}}"
  exposed:
    template: "uniform {{definition}}"