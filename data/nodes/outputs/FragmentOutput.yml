# nodes/outputs/FragmentOutput.yml
name: "Fragment Output"
category: "outputs"
description: "The final output for a fragment shader."

# This node assigns values to the final output variables.
# The code generator will handle multiple assignments.
template_code: |
  ALBEDO = {{albedo}};
  NORMALMAP = {{normal}};
  ROUGHNESS = {{roughness}};
  METALLIC = {{metallic}};
  AO = {{ao}};

inputs:
  - name: "albedo"
    type: "vec3"
    default_value: { x: 1.0, y: 1.0, z: 1.0 }
  - name: "normal"
    type: "vec3"
    default_value: { x: 0.0, y: 0.0, z: 1.0 }
  - name: "roughness"
    type: "float"
    default_value: 1.0
  - name: "metallic"
    type: "float"
    default_value: 0.0
  - name: "ao"
    type: "float"
    default_value: 1.0

outputs: []
