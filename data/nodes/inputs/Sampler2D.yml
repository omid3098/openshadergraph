# nodes/inputs/Sampler2D.yml
name: "Sampler2D"
category: "inputs"
description: "Provides a 2D texture sampler uniform."

# This node declares a uniform, but doesn't have direct code itself.
# The code is generated by the texture() function node.

inputs:
  - name: "uniform_name"
    type: "string"
    default_value: "my_texture"

outputs:
  - name: "out"
    type: "sampler2D"
