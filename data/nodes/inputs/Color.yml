# nodes/inputs/Color.yml
name: "Color"
category: "inputs"
description: "Provides a color value (vec4)."

template_code: "{{out}} = vec4({{value.r}}, {{value.g}}, {{value.b}}, {{value.a}});"

inputs:
  - name: "value"
    type: "vec4"
    default_value: { r: 1.0, g: 1.0, b: 1.0, a: 1.0 }

outputs:
  - name: "out"
    type: "vec4"
