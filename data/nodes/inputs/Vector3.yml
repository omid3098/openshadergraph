# nodes/inputs/Vector3.yml
name: "Vector3"
category: "inputs"
description: "Provides a 3D vector value."

template_code: "{{out}} = vec3({{value.x}}, {{value.y}}, {{value.z}});"

inputs:
  - name: "value"
    type: "vec3"
    default_value: { x: 0.0, y: 0.0, z: 0.0 }

outputs:
  - name: "out"
    type: "vec3"
