site_name: OpenShaderGraph
site_description: Documentation for the OpenShaderGraph project
repo_url: https://github.com/omid3098/openshadergraph
edit_uri: ""

# Output docs alongside the Bun build so the server can serve /docs
site_dir: dist/docs

# Docs source directory
docs_dir: docs

theme:
  palette:
    - scheme: slate
      primary: green
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode
    - scheme: default
      primary: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  name: material
  features:
    - navigation.instant
    - navigation.footer
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Features: features.md
  - Tutorials:
      - Overview: tutorials.md
      - Basic Color: tutorials/basic-color.md
      - Addition (Color + Color): tutorials/add-color-color.md
  - Developers: developers.md
  - Contributing: contributing.md

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

# Ensure links are generated relative to /docs base path
use_directory_urls: true
